# ══════════════════════════════════════
# PMarb Configuration — LIVE DATA
# ══════════════════════════════════════

polymarket:
  # Verified via Gamma API 2026-03-27 (all active, not closed)
  markets:
    ceasefire:
      slug: "us-x-iran-ceasefire-by-may-31-313-373-916"
      description: "US x Iran ceasefire by May 31"
      resolution_source: "consensus_of_reporting"
      bilateral_required: true
    ceasefire_apr15:
      slug: "us-x-iran-ceasefire-by-april-15-182-528-637"
      description: "US x Iran ceasefire by April 15"
      resolution_source: "consensus_of_reporting"
      bilateral_required: true
    hormuz_strait:
      slug: "strait-of-hormuz-traffic-returns-to-normal-by-april-30"
      description: "Strait of Hormuz traffic returns to normal by end of April"
      resolution_source: "imf_portwatch"

  poll_interval_sec: 5


tradfi:
  instruments:
    - symbol: USO
      exchange: ARCA
      type: stock
      use_for: put_hedge
    - symbol: BNO
      exchange: ARCA
      type: stock
      use_for: call_hedge
    - symbol: CL
      exchange: NYMEX
      type: future
      description: WTI Crude
    - symbol: BZ
      exchange: NYMEX
      type: future
      description: Brent Crude

  options:
    target_delta: 0.25        # OTM target for hedge
    min_dte: 14               # minimum days to expiry
    max_dte: 90               # maximum days to expiry
    max_bid_ask_spread: 0.20  # max acceptable spread in USD

portwatch:
  # IMF PortWatch ArcGIS endpoint
  base_url: "https://portwatch.imf.org"
  chokepoint: "Strait of Hormuz"
  poll_interval_sec: 21600  # 6 hours
  update_day: "Tuesday"
  update_time_et: "09:00"

eia:
  base_url: "https://api.eia.gov/v2"
  series:
    weekly_stocks: "petroleum/sum/sndw"
    monthly_supply: "petroleum/sup/sum"
  poll_interval_sec: 3600  # 1 hour

sentiment:
  keywords:
    ceasefire: ["ceasefire", "peace deal", "truce", "negotiations", "postpone strikes", "de-escalation"]
    escalation: ["strike", "attack", "blockade", "retaliation", "nuclear", "bombing", "invasion"]
    iran_confirm: ["IRNA", "PressTV", "Tehran confirms", "Iran agrees", "Khamenei"]
    oil_disruption: ["oil supply", "tanker disruption", "hormuz", "strait closure", "shipping halt"]
  sources:
    - name: "google_news_iran"
      type: "rss"
      url: "https://news.google.com/rss/search?q=iran+ceasefire+OR+iran+strike+OR+hormuz+blockade&hl=en-US&gl=US&ceid=US:en"
    - name: "google_news_oil"
      type: "rss"
      url: "https://news.google.com/rss/search?q=oil+supply+disruption+OR+hormuz+OR+tanker+attack&hl=en-US&gl=US&ceid=US:en"
    - name: "reuters_mideast"
      type: "rss"
      url: "https://news.google.com/rss/search?q=site:reuters.com+iran+OR+hormuz+OR+oil+sanctions&hl=en-US&gl=US&ceid=US:en"

analytics:
  ceasefire:
    pm_yes_threshold: 0.15     # trigger when YES > 15%
    signal_cooldown_sec: 300   # 5 min between signals
  hormuz:
    pm_yes_threshold: 0.30     # trigger when YES > 30%
    ais_stale_days: 7          # data older than 7 days = unreliable
  latency:
    portwatch_update_day: "Tuesday"
    eia_wpsr_update_day: "Wednesday"
    eia_psm_lag_months: 2

risk:
  max_session_loss_usd: 500
  max_single_position_usd: 1000
  max_locked_capital_usd: 5000
  max_positions: 10
  capital_lockup_buffer_days: 7   # UMA dispute buffer
  depeg_alert_threshold_bps: 50   # 0.5% USDC deviation
  curve_3pool_check_interval: 300 # 5 min
